﻿﻿﻿﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>视频拆图 | VidPic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-row">
                <h1>
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 8px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8"/><path d="M8 11h6"/></svg>
                    视频拆图VidPic
                </h1>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换深浅模式">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
            <p class="subtitle">将视频转换为可打印的翻页动画书</p>
        </header>

        <!-- 上传和控制面板 -->
        <div class="control-panel" id="controlPanel">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('videoInput').click()">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                </div>
                <div class="upload-text">点击或拖拽上传视频</div>
                <div class="upload-hint">支持 MP4, WebM, MOV 等格式</div>
            </div>
            <input type="file" id="videoInput" accept="video/*" onchange="handleFileSelect(event)">

            <div class="settings">
                <div class="setting-group">
                    <label>每秒帧数 <span class="quality-badge quality-high" id="qualityBadge">高质量</span></label>
                    <input type="range" id="fpsInput" min="1" max="30" value="8" oninput="updateFPS(this.value)">
                    <div class="range-value" id="fpsValue">8 fps</div>
                    <small>建议8-12帧</small>
                </div>
                <div class="setting-group">
                    <label>最多提取秒数</label>
                    <input type="number" id="maxDuration" value="10" min="1" max="60">
                    <small>限制提取时长，默认为10秒</small>
                </div>
                <div class="setting-group">
                    <label>尺寸</label>
                    <select id="frameSize">
                        <option value="0.5">小 (50%)</option>
                        <option value="0.75" selected>中 (75%)</option>
                        <option value="1.0">原始尺寸</option>
                    </select>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="extractBtn" onclick="startExtraction()" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    开始提取帧
                </button>
                <button class="btn btn-secondary" onclick="resetAll()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    重置
                </button>
            </div>
        </div>

        <!-- 进度显示 -->
        <div class="progress-section" id="progressSection">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                正在提取...
            </h3>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">总帧数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statCurrent">0</div>
                    <div class="stat-label">已提取</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statTime">0s</div>
                    <div class="stat-label">视频时长</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statPages">0</div>
                    <div class="stat-label">预计页数</div>
                </div>
            </div>
        </div>

        <!-- 帧预览 -->
        <div class="preview-section" id="previewSection">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                预览
            </h3>
            <div class="preview-controls">
                <span>操作：</span>
                <button class="btn btn-secondary" onclick="selectAll()">全选</button>
                <button class="btn btn-secondary" onclick="deselectAll()">取消全选</button>
                <button class="btn btn-danger" onclick="deleteSelected()">删除选中</button>
                <span id="selectedCount" style="margin-left: auto; font-weight: 600; color: #666;">已选择: 0 帧</span>
            </div>
            <div class="frame-grid" id="frameGrid"></div>
            <div class="actions" style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="generatePrintPages()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    生成打印页面
                </button>
            </div>
        </div>

        <!-- 打印排版 -->
        <div class="print-section" id="printSection">
            <div id="printPages"></div>
            <div class="print-actions">
                <button class="btn btn-success" onclick="window.print()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    打印
                </button>
                <button class="btn btn-primary" onclick="downloadPDF()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载ZIP
                </button>
                <button class="btn btn-primary" onclick="downloadPages()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                    批量下载图片
                </button>
                <button class="btn btn-secondary" onclick="backToEdit()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    返回编辑
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer class="site-footer">
        <span>© 2026 <a href="https://zeora.top" target="_blank" rel="noopener">Zeora</a></span>
        <a class="footer-github" href="https://github.com/Zeora315/VidPic" target="_blank" rel="noopener" title="GitHub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
        <button class="footer-tip-btn" onclick="showTipModal()" title="温馨提示">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>
    </footer>

    <div class="modal-overlay" id="tipModal" onclick="closeTipModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>温馨提示</span>
            </div>
            <div class="modal-body">
                <p>为了避免性能问题，建议经常刷新网页优化性能。</p>
                <p>同时请确保你的浏览器和设备性能良好。</p>
            </div>
            <button class="btn btn-primary modal-close-btn" onclick="closeTipModal()">我知道了</button>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay" id="deleteConfirmModal" onclick="closeDeleteConfirm(event)">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--c-danger);"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                <span>确认删除</span>
            </div>
            <div class="modal-body">
                <p id="deleteConfirmText">确定要删除选中的帧吗？此操作不可撤销。</p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeDeleteConfirm()">取消</button>
                <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <video class="hidden-video" id="videoElement" crossorigin="anonymous"></video>
    <canvas class="canvas-hidden" id="canvas"></canvas>

    <script src="app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</body>
</html>
